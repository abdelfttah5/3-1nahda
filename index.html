<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>علامة الروند — إصدار الصوت المضمون</title>
<style>
  :root {
    --bg:#f6f9ff; --card:#ffffff; --ink:#0f172a; --ring:#e2e8f0; --accent:#0ea5e9; --flash: rgba(14,165,233,.35);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:"Tajawal",system-ui,-apple-system,Segoe UI,Arial,sans-serif; }
  .app { width:min(1020px,96vw); margin:18px auto; background:var(--card); border:1px solid var(--ring); border-radius:20px; box-shadow:0 10px 30px rgba(2,6,23,.06); padding:16px 18px; }
  h1 { margin:0 0 10px; text-align:center; font-size:clamp(22px,4vw,30px); }
  .notice { text-align:center; margin:6px 0 12px; color:#2563eb; font-weight:600; }
  .kbd { position:relative; width:100%; aspect-ratio: 3.0/1; border:1px solid var(--ring); border-radius:14px; overflow:hidden; }
  .kbd img { width:100%; height:100%; object-fit:cover; display:block; }
  .key-area { position:absolute; top:0; bottom:0; z-index:2; }
  .key-area.active::after { content:""; position:absolute; inset:0; background:var(--flash); }
  .note-label { position:absolute; top:6px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.6); color:#fff; padding:2px 6px; border-radius:6px; font-size:14px; line-height:1; display:none; pointer-events:none; }
  .key-area.active .note-label { display:inline-block; }
  .controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 6px; }
  .btn-green { background:#10b981; color:#fff; border-color:transparent; }
  .btn-amber { background:#f59e0b; color:#fff; border-color:transparent; }
  .btn-blue  { background:#3b82f6; color:#fff; border-color:transparent; }
  .btn-purple{ background:#7c3aed; color:#fff; border-color:transparent; }
  .btn-active { box-shadow:0 0 0 3px rgba(0,0,0,.08) inset; filter:brightness(.95);}
  button { border:1px solid var(--ring); background:#fff; padding:10px 14px; border-radius:12px; cursor:pointer; min-width:120px; }
  button.primary { background:var(--accent); color:#fff; border-color:transparent; }
  button.stop { background:#ef4444; color:#fff; border-color:transparent; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .panel { border:1px solid var(--ring); border-radius:16px; padding:12px; background:#fff; }
  .imgwrap { display:flex; align-items:center; justify-content:center; min-height:200px; }
  .imgwrap img { max-width:100%; max-height:220px; object-fit:contain; }
  .seq { display:grid; grid-template-columns:repeat(4, minmax(60px,1fr)); gap:10px; padding:10px; min-height:110px; }
  .cell { border:1px dashed var(--ring); border-radius:12px; display:flex; align-items:center; justify-content:center; aspect-ratio: 1.4/1; background:#fafafa; }
  .cell img { max-width:90%; height:auto; }
  .credit { text-align:center; margin-top:8px; font-size:14px; }
  .speed { font-weight:600; }
</style>
</head>

let audioCtx = null; // will be created on user gesture
let unlocked = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') return audioCtx.resume();
  return Promise.resolve();
}

function testBeep() {
  const t = audioCtx.currentTime + 0.02;
  const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
  osc.type = 'sine'; osc.frequency.value = 880;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.6, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.12);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.14);
}

function playSustained(freq, startTime, dur){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(0.85, startTime + 0.03);
  gain.gain.setValueAtTime(0.85, startTime + Math.max(0, dur - 0.07));
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(startTime); osc.stop(startTime + dur + 0.01);
}

let bpm = 100; const presets = [60,80,100,120,140]; let presetIdx = 2;
const speedBtn = document.getElementById('btn-speed');
const speedVal = document.getElementById('speed-val');
const stopBtn = document.getElementById('btn-stop');
const resetBtn = document.getElementById('btn-reset');
const autoBtn = document.getElementById('btn-autoplay');
const emiBtn  = document.getElementById('btn-emi');
const audioBtn = document.getElementById('btn-audio');
const audioMsg = document.getElementById('audio-lock-msg');
const seq = document.getElementById('seq');
const imgMain = document.getElementById('img-main');
const kbd = document.getElementById('kbd');

let timers = []; let autoTimers = []; let activeKey = null; let isAuto = false; let emiMode = false; let beatsMode = 4;

function beatMs() { return 60000 / bpm; }
function clearTimers() { timers.forEach(t=>clearTimeout(t)); timers = []; }
function clearAutoTimers() { autoTimers.forEach(t=>clearTimeout(t)); autoTimers = []; }
function clearSeq() { [...seq.children].forEach(c => c.innerHTML = ""); }
function setActiveKey(el) { if (activeKey) activeKey.classList.remove('active'); activeKey = el; if (el) el.classList.add('active'); }
function showBeatImage(i) { const c = seq.children[i]; if (!c) return; const im = new Image(); if (emiMode) { const arr=[IMG_11,IMG_22,IMG_33,IMG_44]; im.src=arr[Math.min(i,3)]; im.alt='ايمي بارى'; } else { im.src=IMG_NWAR; im.alt='النوار'; } c.innerHTML=''; c.appendChild(im);}
function stopAll() { clearTimers(); clearAutoTimers(); isAuto = false; setActiveKey(null); }

function playNoteEx(index, opts={}) {
  if (index < 0 || index >= NOTE_FREQS.length) return;
  ensureAudio().then(()=>{
    if (!unlocked) return; // safety
    if (!opts.fromAuto) stopAll();
    clearSeq();
    const keyEl = kbd.querySelector(`.key-area[data-note="${index}"]`);
    setActiveKey(keyEl);
    const dur = beatsMode * beatMs() / 1000;
    playSustained(NOTE_FREQS[index], audioCtx.currentTime + 0.02, dur);
    for (let i=0;i<beatsMode;i++) timers.push(setTimeout(() => showBeatImage(i), i*beatMs()));
  });
}

kbd.querySelectorAll('.key-area').forEach(el => el.addEventListener('click', () => playNoteEx(parseInt(el.dataset.note), {fromAuto:false})));

function playScaleUpRestDown(){
  if (isAuto) return;
  ensureAudio().then(()=>{
    if (!unlocked) return;
    isAuto = true; clearTimers(); clearAutoTimers();
    const up=[0,1,2,3,4,5,6,7], down=[7,6,5,4,3,2,1,0];
    const seqAll=[...up,'rest',...down];
    const perNoteMs=beatsMode*beatMs(), restMs=1*beatMs();
    let t=0;
    seqAll.forEach(item=>{
      if(item==='rest'){ autoTimers.push(setTimeout(()=>{ clearSeq(); setActiveKey(null); }, t)); t+=restMs; }
      else { const idx=item; autoTimers.push(setTimeout(()=>{ if(isAuto) playNoteEx(idx, {fromAuto:true}); }, t)); t+=perNoteMs+80; }
    });
    autoTimers.push(setTimeout(()=>{ if(!isAuto) return; clearTimers(); playScaleUpRestDown(); }, t+50));
  });
}

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume().then(()=>{ unlocked = true; testBeep(); audioBtn.disabled = true; audioBtn.textContent = "🔊 الصوت مفعّل"; audioMsg.textContent = "الصوت مفعّل — يمكنك البدء الآن."; });
});

// Define hotspots with small gaps and add labels
(function(){ const seg=12.5, gap=1.6;
  const names = ['دو','ري','مي','فا','صول','لا','سي','دو'];
  document.querySelectorAll('#kbd .key-area').forEach((el,idx)=>{
    el.style.width = `calc(${seg}% - ${gap}%)`;
    el.style.left  = `calc(${idx*seg}% + ${gap/2}%)`;
    el.dataset.name = names[idx];
    // add label span once
    if (!el.querySelector('.note-label')){
      const span = document.createElement('span');
      span.className = 'note-label';
      span.textContent = names[idx];
      el.appendChild(span);
    }
  });
})();


// ---- Beats mode buttons ----
const btnBilansh = document.getElementById('btn-bilansh');
const btnOneBeat = document.getElementById('btn-onebeat');
const btnRond    = document.getElementById('btn-rond');

function updateBeatButtons(){
  btnBilansh.classList.toggle('btn-active', beatsMode===2);
  btnOneBeat.classList.toggle('btn-active', beatsMode===1);
  btnRond.classList.toggle('btn-active', beatsMode===4);
}

btnBilansh.addEventListener('click', ()=>{ beatsMode=2; updateBeatButtons(); imgMain.src = IMG_BLANCHE_BTN_DATA; });
btnOneBeat.addEventListener('click', ()=>{ beatsMode=1; updateBeatButtons(); imgMain.src = IMG_NWAR_BTN_DATA; });
btnRond.addEventListener('click', ()=>{ beatsMode=4; updateBeatButtons(); imgMain.src = IMG_ROND; });
// Keep buttons synced initially and when needed
updateBeatButtons();

// --- Note image switching ---
const noteImg = document.getElementById('noteImage');
const IMG_NWAR_BTN = 'النوار.jpg';
const IMG_BLANCHE_BTN = 'بلانش.jpg';
btnOneBeat.addEventListener('click', ()=>{
  beatsMode = 1;
  updateBeatButtons();
  noteImg.src = IMG_NWAR_BTN;
});
btnBilansh.addEventListener('click', ()=>{
  beatsMode = 2;
  updateBeatButtons();
  noteImg.src = IMG_BLANCHE_BTN;
});
btnRond.addEventListener('click', ()=>{

});
